name: Research
description: Investigate a product, architecture, HR, ATS or AI question
title: "[RESEARCH] "
labels:
  - "type:research"
body:
  - type: textarea
    id: question
    attributes:
      label: Research question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Preferred primary sources
      description: Standards, official documentation, papers or datasets.
  - type: textarea
    id: output
    attributes:
      label: Expected output
      description: ADR, recommendation, prototype, benchmark or documentation.
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision enabled by this research
